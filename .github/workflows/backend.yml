name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"  # Change 3: PR path consistency

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Change 2: Least-privilege token scope
permissions:
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: skillswap-backend
  ECS_CLUSTER: skillswap-cluster
  ECS_SERVICE: skillswap-backend-task-service-kg42kvgw
  CONTAINER_NAME: backend
  ECS_TASK_DEFINITION: skillswap-backend-task

jobs:
  # ─── 1. LINT & TEST ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Change 4: Prevent runaway jobs
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2  (Change 1: SHA pin)

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b2b8a0a4b0e  # v4.4.0  (Change 1: SHA pin)
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Run ESLint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/testdb
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          PORT: 5200
          CORS_ORIGIN: http://localhost:3000
          AWS_S3_BUCKET_NAME: test-bucket
          AWS_ACCESS_KEY_ID: test-key
          AWS_SECRET_ACCESS_KEY: test-secret-key
          AWS_REGION: eu-north-1
          FASTAPI_URL: http://localhost:8000

  # ─── 2. BUILD & PUSH TO ECR ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Change 4: Prevent runaway jobs
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2  (Change 1: SHA pin)

      # TODO: Migrate to OIDC — replace IAM keys with role-to-assume
      # See: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0  (Change 1: SHA pin)
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1  (Change 1: SHA pin)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0  (Change 1: SHA pin)

      - name: Build and push image to ECR
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e362a7a9e12  # v6.18.0  (Changes 1 & 9: SHA pin + v5→v6)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          context: ./backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }},${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image ID
        id: build-image
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ─── 3. PRISMA MIGRATE + ECS DEPLOY ───────────────────────────────────────
  deploy:
    name: Prisma Migrate & ECS Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Change 4: Prevent runaway jobs
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # NOTE: Checkout is required here — Prisma migrate deploy reads prisma/ from the repo
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2  (Change 1: SHA pin)

      # TODO: Migrate to OIDC — replace IAM keys with role-to-assume
      # See: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0  (Change 1: SHA pin)
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b2b8a0a4b0e  # v4.4.0  (Change 1: SHA pin)
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Run Prisma Migrate Deploy
        working-directory: backend
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@9666dc9a3bf790a3a6a49737b240f17fa599a5d2  # v1.5.3  (Change 1: SHA pin)
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@2a0267a22fdc1f6fb9b0b7e6e849a2ee076d74ee  # v2.3.1  (Change 1: SHA pin)
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # Change 6: Smoke test to validate deployment at application level
      - name: Smoke test deployment
        run: |
          echo "⏳ Waiting 30s for service to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 --retry 3 --retry-delay 10 \
            "http://skillswap-alb-496974982.eu-central-1.elb.amazonaws.com/api/health")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Backend smoke test passed! HTTP $STATUS"
          else
            echo "❌ Backend smoke test failed! HTTP $STATUS"
            exit 1
          fi

      # Change 5: Clean up old ECR images — keep 5 most recent to control storage costs
      - name: Clean up old ECR images
        run: |
          echo "🧹 Cleaning up old ECR images (keeping 5 most recent)..."
          IMAGES_TO_DELETE=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --query 'sort_by(imageDetails,& imagePushedAt)[:-5].imageDigest' \
            --output text)

          if [ -n "$IMAGES_TO_DELETE" ] && [ "$IMAGES_TO_DELETE" != "None" ]; then
            for digest in $IMAGES_TO_DELETE; do
              aws ecr batch-delete-image \
                --repository-name ${{ env.ECR_REPOSITORY }} \
                --image-ids imageDigest=$digest
            done
            echo "✅ Cleaned up old ECR images"
          else
            echo "ℹ️ No old images to clean up"
          fi
