name: PyBackend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'pyBackend/**'
      - '.github/workflows/pybackend.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'pyBackend/**'
      - '.github/workflows/pybackend.yml'  # Change 3: PR path consistency

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Change 2: Least-privilege token scope
permissions:
  contents: read

env:
  AWS_REGION: eu-central-1
  LAMBDA_FUNCTION_NAME: skillswap-pybackend

jobs:
  # ─── 1. LINT & TEST ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Change 4: Prevent runaway jobs
    defaults:
      run:
        working-directory: pyBackend

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2  (Change 1: SHA pin)

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0  (Change 1: SHA pin)
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx

      - name: Run Flake8 linter
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings (max line length 120)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        run: |
          # Run tests if they exist. If not, just validate the app can be imported.
          if [ -d "tests" ] || find . -name "test_*.py" | grep -q .; then
            pytest --cov=. --cov-report=xml -v
          else
            echo "No tests found. Validating app import..."
            python -c "from main import app; print('App imported successfully')"
          fi
        env:
          CORS_ORIGIN: http://localhost:3000
          PORT: 8000

  # ─── 2. BUILD & DEPLOY TO LAMBDA ──────────────────────────────────────────
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Change 4: Prevent runaway jobs
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2  (Change 1: SHA pin)

      # TODO: Migrate to OIDC — replace IAM keys with role-to-assume
      # See: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0  (Change 1: SHA pin)
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0  (Change 1: SHA pin)
        with:
          python-version: '3.11'

      - name: Install production dependencies into package dir
        working-directory: pyBackend
        run: |
          pip install -r requirements.txt --target ./package

      - name: Create deployment ZIP
        working-directory: pyBackend
        run: |
          # Copy source files into the package directory
          cp -r api logger.py main.py package/
          cd package
          find . -type d -name "__pycache__" -exec rm -rf {} +
          zip -r ../deploy.zip . -x "*.pyc" "*__pycache__*" "tests/*"
          cd ..
          echo "Deployment package size: $(du -sh deploy.zip)"

      - name: Deploy to AWS Lambda
        working-directory: pyBackend
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deploy.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Change 7: Actually validate the HTTP status code in Lambda response
      - name: Verify Lambda deployment
        run: |
          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --payload '{"httpMethod": "GET", "path": "/health", "headers": {}, "queryStringParameters": null, "body": null}' \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json

          STATUS=$(python3 -c "
          import json
          with open('/tmp/response.json') as f:
              r = json.load(f)
          print(r.get('statusCode', 500))
          ")

          if [ "$STATUS" = "200" ]; then
            echo "✅ Lambda health check passed! Status: $STATUS"
            cat /tmp/response.json
          else
            echo "❌ Lambda health check failed! Status: $STATUS"
            cat /tmp/response.json
            exit 1
          fi
