name: PyBackend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'pyBackend/**'
      - '.github/workflows/pybackend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pyBackend/**'

env:
  AWS_REGION: eu-central-1
  LAMBDA_FUNCTION_NAME: skillswap-pybackend

jobs:
  # ─── 1. LINT & TEST ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pyBackend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx

      - name: Run Flake8 linter
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings (max line length 120)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        run: |
          # Run tests if they exist. If not, just validate the app can be imported.
          if [ -d "tests" ] || find . -name "test_*.py" | grep -q .; then
            pytest --cov=. --cov-report=xml -v
          else
            echo "No tests found. Validating app import..."
            python -c "from main import app; print('App imported successfully')"
          fi
        env:
          CORS_ORIGIN: http://localhost:3000
          PORT: 8000

  # ─── 2. BUILD & DEPLOY TO LAMBDA ──────────────────────────────────────────
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install production dependencies into package dir
        working-directory: pyBackend
        run: |
          pip install -r requirements.txt --target ./package

      - name: Create deployment ZIP
        working-directory: pyBackend
        run: |
          # Copy source files into the package directory
          cp -r api logger.py main.py package/
          cd package
          zip -r ../deploy.zip .
          cd ..
          echo "Deployment package size: $(du -sh deploy.zip)"

      - name: Deploy to AWS Lambda
        working-directory: pyBackend
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deploy.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify Lambda deployment
        run: |
          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --payload '{"httpMethod": "GET", "path": "/health", "headers": {}, "queryStringParameters": null, "body": null}' \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json
          cat /tmp/response.json
          echo "Lambda deployed and responding!"
